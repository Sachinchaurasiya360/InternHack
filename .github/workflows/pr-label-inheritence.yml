name: PR Label Inheritance

on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  issues: read
  pull-requests: write

jobs:
  inherit-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Inherit Labels from Issues and Add Special Labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const prNumber = pr.number;

            console.log(`Processing PR #${prNumber}`);

            // ── Label categories managed by dedicated workflows ─────────────
            // These are intentionally excluded from inheritance to avoid
            // conflicts with difficulty.yml, type-labeler.yml, quality-labeler.yml,
            // and pr-auto-assign.yml (gssoc:approved).
            const MANAGED_PREFIXES = [
              'level:',       // owned by difficulty.yml
              'type:',        // owned by type-labeler.yml
              'quality:',     // owned by quality-labeler.yml
              'scope:',       // owned by scope-labeller.yml
              'gssoc:',       // owned by pr-auto-assign.yml
              'mentor:',      // managed manually by mentors
            ];

            function isManagedLabel(name) {
              return MANAGED_PREFIXES.some(prefix => name.startsWith(prefix));
            }

            // ── Main Logic ───────────────────────────────────────────────────
            try {
              // 1. Extract linked issue numbers using regex
              const regex = /(?:fixes|closes|resolves|fixed|closed|resolved)\s+#(\d+)/gi;
              const linkedIssues = [...new Set([...body.matchAll(regex)].map(m => parseInt(m[1])))];

              console.log(`Linked issues found: ${linkedIssues.join(', ') || 'None'}`);

              const labelsToSet = new Set();

              // 2. Fetch labels from linked issues in parallel
              await Promise.all(linkedIssues.map(async (issueNumber) => {
                try {
                  const { data: issue } = await github.rest.issues.get({
                    ...repo,
                    issue_number: issueNumber
                  });
                  if (issue.labels) {
                    issue.labels.forEach(label => {
                      const name = typeof label === 'string' ? label : label.name;
                      if (!isManagedLabel(name)) {
                        labelsToSet.add(name);
                        console.log(`Inheriting label "${name}" from issue #${issueNumber}`);
                      }
                    });
                  }
                } catch (err) {
                  console.warn(`Could not fetch labels for issue #${issueNumber}: ${err.message}`);
                }
              }));

              // 3. Hacktoberfest Label Check
              const createdAt = new Date(pr.created_at);
              if (createdAt.getMonth() === 9) { // October
                labelsToSet.add('hacktoberfest-accepted');
              }

              // 4. Robust Append (Non-destructive)
              if (labelsToSet.size > 0) {
                const { data: currentIssue } = await github.rest.issues.get({
                  ...repo,
                  issue_number: prNumber
                });
                const currentLabels = currentIssue.labels.map(l => (typeof l === 'string' ? l : l.name));
                const newLabels = [...labelsToSet].filter(l => !currentLabels.includes(l));

                if (newLabels.length > 0) {
                  await github.rest.issues.addLabels({
                    ...repo,
                    issue_number: prNumber,
                    labels: newLabels
                  });
                  console.log(`Successfully appended labels: ${newLabels.join(', ')}`);
                }
              }
            } catch (err) {
              console.error(`Inference failed: ${err.message}`);
              // Do not crash the workflow
            }
