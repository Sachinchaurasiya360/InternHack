name: CI

on:
  pull_request:
    branches:
      - main

env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy"

jobs:
  typecheck-client:
    name: Typecheck Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run TypeScript check
        run: npx tsc -b
        working-directory: client

  typecheck-server:
    name: Typecheck Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Generate Prisma client
        run: npx prisma generate --schema=src/database/prisma/schema
        working-directory: server

      - name: Run TypeScript check
        run: npx tsc --noEmit
        working-directory: server

  lint-client:
    name: Lint Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx
        working-directory: client

  lint-server:
    name: Lint Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Run ESLint
        run: npx eslint src
        working-directory: server

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: [typecheck-client, lint-client]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    needs: [typecheck-server]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Generate Prisma client
        run: npx prisma generate --schema=src/database/prisma/schema
        working-directory: server

      - name: Run unit tests
        run: npm test
        working-directory: server

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [typecheck-server, test-server]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Generate Prisma client
        run: npx prisma generate --schema=src/database/prisma/schema
        working-directory: server

      - name: Build server
        run: npm run build
        working-directory: server

  security-audit:
    name: Security & Secrets Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Audit client dependencies
        run: npm audit --audit-level=high || true
        working-directory: client

      - name: Audit server dependencies
        run: npm audit --audit-level=high || true
        working-directory: server

      - name: Scan for committed secrets/keys
        run: |
          echo "Scanning codebase for potential hardcoded secrets..."
          if grep -rnE "(password|secret|private_key|api_key|token)[[:space:]]*=[[:space:]]*['\"][a-zA-Z0-9_-]{20,}['\"]" client/src/ server/src/ --exclude-dir=node_modules | grep -v "your-github-client-secret"; then
            echo "Error: Potential hardcoded secrets found!"
            exit 1
          else
            echo "No plain secrets found."
          fi
