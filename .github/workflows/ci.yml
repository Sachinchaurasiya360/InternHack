name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  typecheck-client:
    name: Typecheck Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a8410d54a2a19d083168285579979318b8882798 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@39a10693d8b2d1d368096899b82144760a99602a # v4.2.0
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run TypeScript check
        run: npx tsc --noEmit
        working-directory: client

  typecheck-server:
    name: Typecheck Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a8410d54a2a19d083168285579979318b8882798 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@39a10693d8b2d1d368096899b82144760a99602a # v4.2.0
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Generate Prisma client
        run: npx prisma generate --schema=src/database/prisma/schema
        working-directory: server

      - name: Run TypeScript check
        run: npx tsc --noEmit
        working-directory: server

      - name: Run unit tests
        run: npm test
        working-directory: server

  lint-client:
    name: Lint Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a8410d54a2a19d083168285579979318b8882798 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@39a10693d8b2d1d368096899b82144760a99602a # v4.2.0
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx
        working-directory: client
