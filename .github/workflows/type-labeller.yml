name: PR Type Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-type-label:
    name: Assign type label(s)
    runs-on: ubuntu-latest

    steps:
      - name: Path-based labeling (Stacking)
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler-rules.yml
          sync-labels: false # Protect manual mentor/admin tier overrides

      - name: Keyword-based labeling
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prTitle = (pr.title || '').toLowerCase();
            const branchName = (pr.head.ref || '').toLowerCase();
            const repo = {
              owner: context.repo.owner,
              repo: context.repo.repo
            };

            // ── Label definitions ──────────────────────────────────────────
            const labelMeta = {
              'type:bug':           { color: 'd73a4a', description: 'Something is broken or incorrect' },
              'type:feature':       { color: '0075ca', description: 'New feature or enhancement' },
              'type:docs':          { color: '0052cc', description: 'Improvements or additions to documentation' },
              'type:testing':       { color: '5319e7', description: 'Tests added or improved' },
              'type:security':      { color: 'e4e669', description: 'Security improvement or fix' },
              'type:performance':   { color: 'f9d0c4', description: 'Performance improvement' },
              'type:design':        { color: 'fef2c0', description: 'UI/UX design changes' },
              'type:refactor':      { color: 'c5def5', description: 'Code refactoring without behavior change' },
              'type:devops':        { color: 'bfd4f2', description: 'CI/CD, infrastructure, or tooling changes' },
              'type:accessibility': { color: 'bfd4f2', description: 'Accessibility improvements' }
            };

            const keywordRules = [
              {
                label: 'type:bug',
                keywords: ['fix', 'bug', 'patch', 'hotfix', 'revert', 'regression', 'crash', 'error', 'issue']
              },
              {
                label: 'type:feature',
                keywords: ['feat', 'feature', 'add', 'new', 'implement', 'enhance', 'improvement', 'support']
              },
              {
                label: 'type:refactor',
                keywords: ['refactor', 'cleanup', 'clean', 'restructure', 'reorganize', 'rename', 'move', 'simplify', 'extract']
              },
              {
                label: 'type:accessibility',
                keywords: ['a11y', 'accessibility', 'aria', 'wcag', 'screen reader', 'keyboard', 'contrast', 'alt text']
              }
            ];

            async function ensureLabelsExist(labels) {
              for (const name of labels) {
                if (labelMeta[name]) {
                  try {
                    await github.rest.issues.getLabel({ ...repo, name });
                  } catch (err) {
                    if (err.status !== 404) throw err;
                    await github.rest.issues.createLabel({
                      ...repo,
                      name,
                      color: labelMeta[name].color,
                      description: labelMeta[name].description
                    });
                  }
                }
              }
            }

            async function getCurrentLabels() {
              const { data: issue } = await github.rest.issues.get({
                ...repo,
                issue_number: prNumber
              });
              return issue.labels.map(l => (typeof l === 'string' ? l : l.name));
            }

            const combinedText = `${prTitle} ${branchName}`;
            const detectedLabels = new Set();
            for (const rule of keywordRules) {
              if (rule.keywords.some(kw => combinedText.includes(kw))) {
                detectedLabels.add(rule.label);
              }
            }

            if (detectedLabels.size > 0) {
              await ensureLabelsExist([...detectedLabels]);
              const currentLabels = await getCurrentLabels();
              const labelsToAdd = [...detectedLabels].filter(l => !currentLabels.includes(l));
              
              if (labelsToAdd.length > 0) {
                await github.rest.issues.addLabels({
                  ...repo,
                  issue_number: prNumber,
                  labels: labelsToAdd
                });
                console.log(`Added keyword-based labels: ${labelsToAdd.join(', ')}`);
              }
            }
