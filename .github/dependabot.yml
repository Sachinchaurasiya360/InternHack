# Dependabot Configuration
# Automatically opens PRs to update vulnerable or outdated dependencies.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # ── Server npm dependencies ────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    reviewers:
      - "Sachinchaurasiya360"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps):"
    # Group minor + patch updates to reduce PR noise
    groups:
      server-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ── Client npm dependencies ────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    reviewers:
      - "Sachinchaurasiya360"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps):"
    groups:
      client-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions ─────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    reviewers:
      - "Sachinchaurasiya360"
    labels:
      - "dependencies"
      - "ci/cd"
    commit-message:
      prefix: "chore(ci):"
