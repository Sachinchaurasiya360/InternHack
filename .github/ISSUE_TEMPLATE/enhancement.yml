name: Enhancement
description: Suggest an improvement
title: "[ENHANCEMENT]: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        ## Enhancement Request

        Please provide complete details so maintainers can triage quickly.

  - type: textarea
    id: current
    attributes:
      label: Current Behavior
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: Suggested Improvement
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: Benefits
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Possible Implementation